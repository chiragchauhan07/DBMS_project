<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Nexus Bank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Nexus<span>Bank</span></a>
        <div class="nav-links">
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container flex gap-1" style="align-items: flex-start;">
        <!-- Left: Account Summary -->
        <div class="glass-panel" style="flex: 1;">
            <h2>Welcome, <span id="userName" style="color: var(--primary);">User</span></h2>
            <p class="text-muted" style="margin-bottom: 2rem;">Acct No: <span id="accountNo" style="font-family: monospace;">---</span></p>
            
            <div style="background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 12px; text-align: center; margin-bottom: 2rem;">
                <p class="text-muted">Available Balance</p>
                <h1 style="font-size: 2.5rem; color: var(--secondary);">₹<span id="balance">0.00</span></h1>
            </div>

            <h3>Transfer Funds</h3>
            <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 1rem;">ACID-compliant instant DBMS transfer</p>
            <form id="transferForm">
                <div class="form-group">
                    <label>Receiver Phone Number</label>
                    <input type="text" id="txnPhone" class="form-control" required placeholder="Enter receiver's registered phone">
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="txnAmount" class="form-control" required min="1">
                </div>
                <div class="form-group">
                    <label>Transaction Password</label>
                    <input type="password" id="txnPass" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary mt-2">Send Money</button>
                <p id="txMsg" class="text-center mt-2"></p>
            </form>
        </div>

        <!-- Right: Transaction History -->
        <div class="glass-panel" style="flex: 1.5;">
            <h3>Recent Transactions</h3>
            <table style="margin-top: 1rem;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="txTableBody">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('user_id');
        if(!userId) window.location.href = 'user_login.html';

        async function loadDashboard() {
            try {
                const res = await fetch(`http://localhost:5000/api/user/dashboard?user_id=${userId}`);
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('userName').innerText = data.account.full_name;
                    document.getElementById('accountNo').innerText = data.account.account_number;
                    document.getElementById('balance').innerText = data.account.balance;
                    
                    const tbody = document.getElementById('txTableBody');
                    tbody.innerHTML = '';
                    data.transactions.forEach(tx => {
                        const tr = document.createElement('tr');
                        const isCredit = tx.receiver_account_id === data.account.account_id;
                        
                        tr.innerHTML = `
                            <td>${new Date(tx.created_at).toLocaleString()}</td>
                            <td><span style="padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; background: ${isCredit ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)'}; color: ${isCredit ? 'var(--secondary)' : 'var(--danger)'}">${tx.transaction_type}</span></td>
                            <td style="color: ${isCredit ? 'var(--secondary)' : 'var(--danger)'}; font-weight: bold;">
                                ${isCredit ? '+' : '-'}₹${tx.amount}
                            </td>
                            <td class="text-muted" style="font-size: 0.9rem;">
                                ${tx.transaction_type === 'Transfer' ? (isCredit ? 'From Account' : 'To Account: ' + tx.recv_acc) : 'System'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch(e) { console.error(e); }
        }

        document.getElementById('transferForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Processing...';
            
            const payload = {
                user_id: userId,
                receiver_phone: document.getElementById('txnPhone').value,
                amount: document.getElementById('txnAmount').value,
                transaction_password: document.getElementById('txnPass').value
            };

            try {
                const res = await fetch('http://localhost:5000/api/user/transfer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                const msgEl = document.getElementById('txMsg');
                if(result.success) {
                    msgEl.className = 'text-center mt-2 text-success';
                    msgEl.innerText = result.message;
                    document.getElementById('transferForm').reset();
                    loadDashboard(); // Refresh data
                } else {
                    msgEl.className = 'text-center mt-2 text-danger';
                    msgEl.innerText = result.error;
                }
            } catch(e) {
                console.error(e);
            } finally {
                btn.innerText = 'Send Money';
            }
        });

        function logout() {
            localStorage.removeItem('user_id');
            window.location.href = 'index.html';
        }

        loadDashboard();
    </script>
</body>
</html>
