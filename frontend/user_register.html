<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Open Account | ANTIGRAVITY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "primary": "#b3c5ff",
                        "tertiary": "#eac34a",
                        "on-tertiary": "#3c2f00",
                        "background": "#10141a",
                        "surface": "#1c2026",
                        "on-surface": "#dfe2eb",
                        "on-surface-variant": "#c5c6d2",
                },
                "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                }
              },
            },
          }
        </script>
    <style>
        body { background-color: #10141a; color: #dfe2eb; font-family: 'Inter', sans-serif; min-height: 100dvh; }
        .bg-card { background-color: #1c2026; }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="max-w-xl w-full">
        <!-- Brand Header -->
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 mb-4">
                <span class="text-xl font-black tracking-tighter text-primary">ANTIGRAVITY</span>
            </a>
            <h1 class="text-3xl font-bold tracking-tight">Begin Your Protocol</h1>
            <p class="text-on-surface-variant text-sm mt-2">Personalized institutional-grade asset management</p>
        </div>

        <!-- Registration Card -->
        <div class="bg-card rounded-[2.5rem] p-10 border border-white/5 shadow-2xl">
            <form id="registerForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Full Legal Name</label>
                        <input type="text" id="fullName" placeholder="e.g. John Doe" required 
                               class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Phone Number</label>
                        <input type="text" id="phone" placeholder="+91 XXXXX XXXXX" required 
                               class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">PAN Card Number</label>
                        <input type="text" id="pan" placeholder="ABCDE1234F" required 
                               class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface uppercase">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Account Type</label>
                        <select id="accType" class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface appearance-none">
                            <option value="Savings">Savings Protocol</option>
                            <option value="Current">Current Protocol</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Residential Address</label>
                    <textarea id="address" placeholder="Full permanent address" required rows="2"
                              class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-on-surface-variant">Transaction Password</label>
                    <input type="password" id="txPass" placeholder="Secure unique password" required 
                           class="w-full bg-background border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-tertiary/50 transition-all text-on-surface">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-primary text-on-tertiary font-bold py-4 rounded-xl hover:bg-tertiary transition-all">
                    Initialize Account
                </button>
            </form>

            <p id="msg" class="mt-6 text-center text-sm font-medium"></p>
        </div>

        <div class="text-center mt-8">
            <p class="text-on-surface-variant text-sm">Already a member? <a href="user_login.html" class="text-primary font-bold">Sign In</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const registerForm = document.getElementById('registerForm');
        const msg = document.getElementById('msg');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            
            btn.innerText = 'Synchronizing...';
            btn.disabled = true;

            const payload = {
                full_name: document.getElementById('fullName').value,
                phone_number: document.getElementById('phone').value,
                pan_number: document.getElementById('pan').value,
                address: document.getElementById('address').value,
                account_type: document.getElementById('accType').value,
                transaction_password: document.getElementById('txPass').value
            };

            try {
                const res = await fetch(`${API_URL}/user/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.success) {
                    msg.className = 'mt-6 text-center text-sm text-green-400 font-bold';
                    msg.innerText = 'Account Protocol Initiated! Redirecting to Sign In...';
                    setTimeout(() => window.location.href = 'user_login.html', 2000);
                } else {
                    msg.className = 'mt-6 text-center text-sm text-red-400';
                    msg.innerText = data.error;
                    btn.disabled = false;
                    btn.innerText = 'Initialize Account';
                }
            } catch (err) {
                console.error(err);
                msg.innerText = 'Network error. Protocol failed.';
            }
        });
    </script>
</body>
</html>
