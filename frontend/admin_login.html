<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DBMS Nexus Bank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Nexus<span>Bank</span> &nbsp; <span style="font-size: 0.9rem; color: #ef4444; font-weight: normal; border: 1px solid #ef4444; padding: 2px 6px; border-radius: 4px;">ADMIN PORTAL</span></a>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="container glass-panel" style="max-width: 400px; margin-top: 5rem;">
        <h2 class="text-center mb-2">Systems Admin Login</h2>
        
        <form id="adminForm">
            <div class="form-group">
                <label>Admin Username</label>
                <input type="text" id="username" class="form-control" required placeholder="admin">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required placeholder="admin123">
            </div>

            <button type="submit" class="btn mt-2" style="background: rgba(239, 68, 68, 0.8); color: white; width: 100%;">Access Database Views</button>
            
            <p id="errorMsg" class="text-danger text-center mt-2"></p>
        </form>
    </div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('http://localhost:5000/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if(result.success) {
                window.location.href = 'admin_dashboard.html';
            } else {
                document.getElementById('errorMsg').innerText = result.error;
            }
        });
    </script>
</body>
</html>
