<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Nexus Bank</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Nexus<span>Bank</span></a>
        <div class="nav-links">
            <a href="user_register.html">Open Account</a>
        </div>
    </nav>

    <div class="container glass-panel" style="max-width: 400px; margin-top: 5rem;">
        <h2 class="text-center mb-2">Personal Banking Login</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" class="form-control" required placeholder="Enter registered phone">
            </div>
            
            <div class="form-group" id="otpGroup" style="display: none;">
                <label>Enter OTP</label>
                <input type="text" id="otp" class="form-control" placeholder="Use '1234' for demo">
            </div>

            <button type="button" id="getOtpBtn" class="btn btn-primary mt-2">Get OTP</button>
            <button type="submit" id="loginBtn" class="btn btn-primary mt-2" style="display: none;">Login via OTP</button>
            
            <p id="errorMsg" class="text-danger text-center mt-2"></p>
        </form>
        
        <p class="text-center mt-2" style="font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="user_register.html" style="color: var(--primary);">Sign up</a>
        </p>
    </div>

    <script>
        const getOtpBtn = document.getElementById('getOtpBtn');
        const loginBtn = document.getElementById('loginBtn');
        const otpGroup = document.getElementById('otpGroup');

        getOtpBtn.addEventListener('click', () => {
            if(document.getElementById('phone').value.trim() !== '') {
                alert("Simulated: OTP sent to your phone! (Hint: enter 1234)");
                getOtpBtn.style.display = 'none';
                otpGroup.style.display = 'block';
                loginBtn.style.display = 'block';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                phone_number: document.getElementById('phone').value,
                otp: document.getElementById('otp').value
            };

            const res = await fetch('http://localhost:5000/api/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if(result.success) {
                localStorage.setItem('user_id', result.user_id);
                window.location.href = 'user_dashboard.html';
            } else {
                document.getElementById('errorMsg').innerText = result.error;
            }
        });
    </script>
</body>
</html>
